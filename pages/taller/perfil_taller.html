<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Taller - AutoGuest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <style>
        body {
            background-color: #202020;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .portal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .portal-header .logo {
            width: 120px;
        }

        .portal-header .header-info {
            text-align: right;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            background: none;
            border: 1px solid #f39c12;
            color: #f39c12;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #f39c12;
            color: #1a1a1a;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #2c2c2c;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            color: #f39c12;
            margin-bottom: 20px;
        }

        .profile-pic-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #f39c12;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #444;
        }

        .profile-pic-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .info-box strong {
            color: #f39c12;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #a0a0a0;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            background-color: #f39c12;
            color: #1a1a1a;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #e67e22;
        }
    </style>
</head>

<body>

    <header class="portal-header">
        <img src="../../imagenes/Logo_Autoguest.png" alt="Logo de AutoGuest" class="logo">
        <div class="header-info">
            <a href="../../portal_taller.html" class="back-btn"><i class="fas fa-arrow-left"></i> Volver al Portal</a>
        </div>
    </header>

    <div class="container">
        <h1>Perfil de tu Taller</h1>

        <div class="profile-pic-container">
            <img id="profileImage" src="../../imagenes/Buscar_taller1.jpg" alt="Foto del Taller"
                onerror="this.src='../../imagenes/Buscar_taller1.jpg'">
        </div>

        <div class="info-box">
            Comparte este <strong>ID de Taller</strong> con tus mecánicos para que puedan registrarse: <br><br>
            <span id="tallerIdDisplay"
                style="font-size: 1.5em; letter-spacing: 2px; background: #333; padding: 5px 15px; border-radius: 5px;">CARGANDO...</span>
        </div>

        <div class="info-box">
            <strong>Nombre del Taller:</strong> <span id="tallerNameDisplay">Cargando...</span> <br>
            <strong>Dirección:</strong> <span id="tallerAddressDisplay">Cargando...</span>
        </div>

        <form id="profileForm">
            <div class="form-group">
                <label for="nombreTallerInput"><i class="fas fa-store"></i> Nombre del Taller</label>
                <input type="text" id="nombreTallerInput" placeholder="Ej. AutoSur" required>
            </div>
            <div class="form-group">
                <label for="whatsappUrl"><i class="fab fa-whatsapp"></i> Número de WhatsApp (Ej. 529991287457)</label>
                <input type="text" id="whatsappUrl" placeholder="Número con código de país">
            </div>
            <div class="form-group">
                <label for="redesUrl"><i class="fas fa-globe"></i> Redes Sociales (Facebook, Insta, etc.)</label>
                <input type="text" id="redesUrl" placeholder="Ej. @MiTaller o Link a Facebook">
            </div>
            <div class="form-group">
                <label for="fotoUrl"><i class="fas fa-image"></i> Enlace de Foto de Perfil (URL)</label>
                <input type="url" id="fotoUrl" placeholder="https://ejemplo.com/mifoto.jpg">
            </div>
            <button type="submit" class="btn"><i class="fas fa-save"></i> Guardar Perfil</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tallerIdDisplay = document.getElementById('tallerIdDisplay');
            const tallerNameDisplay = document.getElementById('tallerNameDisplay');
            const tallerAddressDisplay = document.getElementById('tallerAddressDisplay');
            const profileImage = document.getElementById('profileImage');
            const nombreTallerInput = document.getElementById('nombreTallerInput');
            const whatsappUrl = document.getElementById('whatsappUrl');
            const redesUrl = document.getElementById('redesUrl');
            const fotoUrl = document.getElementById('fotoUrl');
            const profileForm = document.getElementById('profileForm');

            // Cargar información del taller
            try {
                // Fetch full profile
                const res = await fetch('/api/taller/perfil', { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    tallerIdDisplay.textContent = data.idTaller;
                    tallerNameDisplay.textContent = data.nombre;
                    tallerAddressDisplay.textContent = data.direccion || 'No especificada';

                    nombreTallerInput.value = data.nombre || '';
                    whatsappUrl.value = data.telefono_contacto || '';
                    redesUrl.value = data.redes_sociales || '';

                    if (data.foto_perfil) {
                        profileImage.src = data.foto_perfil;
                        fotoUrl.value = data.foto_perfil;
                    }
                } else {
                    tallerIdDisplay.textContent = "Error al cargar";
                }
            } catch (e) {
                console.error("Error", e);
            }

            // Actualizar perfil completo
            profileForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                try {
                    const res = await fetch('/api/taller/perfil', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            nombre: nombreTallerInput.value,
                            telefono_contacto: whatsappUrl.value,
                            redes_sociales: redesUrl.value,
                            foto_perfil: fotoUrl.value
                        }),
                        credentials: 'include'
                    });

                    if (res.ok) {
                        alert('Perfil actualizado exitosamente.');
                        if (fotoUrl.value) {
                            profileImage.src = fotoUrl.value;
                        }
                        tallerNameDisplay.textContent = nombreTallerInput.value;
                    } else {
                        alert('Error al guardar el perfil.');
                    }
                } catch (e) {
                    console.error("Error", e);
                    alert('Error de conexión.');
                }
            });
        });
    </script>
</body>

</html>
