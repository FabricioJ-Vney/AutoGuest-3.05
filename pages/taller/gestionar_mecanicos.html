<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Mecánicos - Portal de Taller</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <style>
        body {
            background-color: #202020;
            color: #f0f0f0;
        }

        .portal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .portal-header .logo {
            width: 120px;
        }

        .back-link {
            color: #c0c0c0;
            text-decoration: none;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #f39c12;
        }

        .header-right h2 {
            margin: 0;
            font-size: 1.2em;
            color: #ffffff;
        }

        .header-right p {
            margin: 0;
            font-size: 0.9em;
            color: #a0a0a0;
        }

        .page-container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 2.2em;
            color: #ffffff;
            margin: 0 0 10px 0;
        }

        .page-subtitle {
            color: #a0a0a0;
            margin: 0;
        }

        .section-container {
            background-color: #2c2c2c;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.2em;
            cursor: pointer;
            padding: 10px;
            transition: color 0.3s;
        }

        .tab-btn.active {
            color: #f39c12;
            border-bottom: 2px solid #f39c12;
        }

        .mecanicos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .mecanico-card {
            background-color: #3a3a3a;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #444;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .mecanico-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        .mecanico-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .mecanico-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        .mecanico-info h3 {
            margin: 0;
            color: #ffffff;
            font-size: 1.2em;
        }

        .mecanico-info p {
            margin: 5px 0 0 0;
            color: #f39c12;
            font-size: 0.9em;
        }

        .mecanico-details {
            border-top: 1px solid #555;
            padding-top: 15px;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: #c0c0c0;
        }

        .detail-item i {
            color: #f39c12;
            width: 20px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .btn-action:hover {
            opacity: 0.8;
        }

        .btn-approve {
            background-color: #27ae60;
            color: white;
        }

        .btn-remove {
            background-color: #c0392b;
            color: white;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #2c2c2c, #3a3a3a);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            border: 1px solid #444;
        }

        .stat-number {
            font-size: 2.5em;
            color: #f39c12;
            font-weight: bold;
            margin: 0;
        }

        .stat-label {
            color: #a0a0a0;
            margin: 5px 0 0 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.2em;
        }
    </style>
</head>

<body>
    <header class="portal-header">
        <div class="header-left">
            <a href="../../portal_taller.html"><img src="../../imagenes/Logo_Autoguest.png" alt="Logo de AutoGuest"
                    class="logo"></a>
            <a href="../../portal_taller.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al Panel</a>
        </div>
        <div class="header-right">
            <h2 id="tallerNameHeader">Portal de Taller</h2>
            <p>Gestión de Mecánicos</p>
        </div>
    </header>

    <main class="page-container">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-users-cog"></i> Mis Mecánicos</h1>
            <p class="page-subtitle">Equipo de trabajo y solicitudes de ingreso al taller</p>
        </div>

        <!-- Estadísticas -->
        <div class="stats-container" id="stats-container">
            <div class="stat-card">
                <p class="stat-number" id="total-mecanicos">0</p>
                <p class="stat-label">Mecánicos Activos</p>
            </div>
            <div class="stat-card">
                <p class="stat-number" id="pendientes-count">0</p>
                <p class="stat-label">Solicitudes Pendientes</p>
            </div>
            <!-- Tarjeta de Invitación (ID Taller) -->
            <div class="stat-card" style="border: 1px solid #f39c12; background: rgba(243, 156, 18, 0.1);">
                <p class="stat-label" style="color: #f39c12; margin-bottom: 5px;">ID DE TALLER (INVITACIÓN)</p>
                <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                    <p class="stat-number" id="taller-id-display" style="font-size: 1.8em; margin: 0;">Cargando...</p>
                    <button onclick="copyToClipboard()"
                        style="background: none; border: none; color: #fff; cursor: pointer; font-size: 1.2em;"
                        title="Copiar ID">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                <p class="stat-label" style="font-size: 0.8em; margin-top: 5px;">Comparte este ID con tus mecánicos para
                    que se registren.</p>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="activos">Mecánicos Activos</button>
            <button class="tab-btn" data-tab="pendientes">Solicitudes Pendientes</button>
        </div>

        <!-- Lista de Mecánicos -->
        <div class="section-container">
            <div id="mecanicos-container" class="mecanicos-grid">
                <!-- Los mecánicos se cargarán aquí -->
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Cargando mecánicos...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="mecanicos-admin.js"></script>
    <script>
        // Cargar ID del Taller
        async function loadTallerInfo() {
            try {
                const res = await fetch('/api/taller/info');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('taller-id-display').textContent = data.idTaller;
                } else {
                    document.getElementById('taller-id-display').textContent = "Error";
                }
            } catch (error) {
                console.error("Error loading info", error);
            }
        }

        function copyToClipboard() {
            const idText = document.getElementById('taller-id-display').textContent;
            navigator.clipboard.writeText(idText).then(() => {
                alert("ID copiado al portapapeles: " + idText);
            });
        }

        document.addEventListener('DOMContentLoaded', loadTallerInfo);
    </script>
    <script src="http://localhost:3000/js/global_nav.js"></script>
</body>

</html>
