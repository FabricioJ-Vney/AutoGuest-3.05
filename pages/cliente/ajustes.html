<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes - AutoGuest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <style>
        .page-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .page-header i {
            font-size: 2.5em;
            color: #f39c12;
        }

        .page-header h1 {
            font-size: 2.5em;
            color: #ffffff;
            margin: 0;
        }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            padding: 25px;
            background-color: #2c2c2c;
            border-radius: 12px;
            text-decoration: none;
            color: #ffffff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border-left: 5px solid transparent;
        }

        .settings-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
            border-left-color: #f39c12;
        }

        .settings-icon {
            font-size: 2em;
            color: #f39c12;
            width: 50px;
            text-align: center;
            margin-right: 20px;
        }

        .settings-content {
            flex-grow: 1;
        }

        .settings-content h3 {
            font-size: 1.4em;
            margin: 0 0 5px 0;
        }

        .settings-content p {
            margin: 0;
            color: #a0a0a0;
            font-size: 0.95em;
        }

        .settings-item.danger {
            border-left-color: #e74c3c;
        }

        .settings-item.danger .settings-icon {
            color: #e74c3c;
        }

        .settings-item.danger:hover {
            border-left-color: #c0392b;
        }
    </style>
</head>

<body>
    <header class="dashboard-header"
        style="max-width: 1200px; margin: 40px auto; padding: 15px 25px; background-color: #2c2c2c; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="dashboard_cliente.html"><img src="../../imagenes/Logo_Autoguest.png" alt="Logo de AutoGuest"
                    style="width: 110px;"></a>
        </div>
        <div class="user-greeting" style="font-size: 1.2em; color: #c0c0c0; font-weight: 500;">
            Ajustes de Cuenta
        </div>
    </header>

    <main class="page-container">
        <div class="page-header">
            <i class="fas fa-cog"></i>
            <h1>Ajustes</h1>
        </div>

        <div class="settings-list">
            <a href="perfil_cliente.html" class="settings-item">
                <div class="settings-icon">
                    <i class="fas fa-user-edit"></i>
                </div>
                <div class="settings-content">
                    <h3>Mi Perfil</h3>
                    <p>Actualiza tus datos personales, contraseña y foto de perfil.</p>
                </div>
                <i class="fas fa-chevron-right" style="color: #666;"></i>
            </a>


            <a href="#" class="settings-item danger" id="btnLogout">
                <div class="settings-icon">
                    <i class="fas fa-sign-out-alt"></i>
                </div>
                <div class="settings-content">
                    <h3 style="color: #e74c3c;">Cerrar Sesión</h3>
                    <p>Desconectarse de forma segura del sistema.</p>
                </div>
            </a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('isLoggedIn') !== 'true') {
                alert('Tu sesión ha expirado. Por favor, inicia sesión de nuevo.');
                window.location.href = '../../login_cliente.html';
                return;
            }

            const btnLogout = document.getElementById('btnLogout');
            if (btnLogout) {
                btnLogout.addEventListener('click', async (e) => {
                    e.preventDefault();
                    if (confirm('¿Estás seguro de que deseas cerrar tu sesión?')) {
                        try {
                            const response = await fetch('/api/registro/logout', { method: 'POST' });
                            if (response.ok) {
                                sessionStorage.clear();
                                window.location.href = '../../index.html';
                            } else {
                                alert('Error al cerrar sesión. Inténtalo de nuevo.');
                            }
                        } catch (error) {
                            console.error('Error de red al cerrar sesión:', error);
                            alert('Error de red al cerrar sesión.');
                        }
                    }
                });
            }
        });
    </script>
    <script src="http://localhost:3000/js/global_nav.js"></script>
</body>

</html>
