<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Pagos y Soporte - AutoGuest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background-color: #1a1a1a;
            border-radius: 12px;
            margin-bottom: 40px;
        }

        .tickets-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ticket-item {
            background-color: #2c2c2c;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            color: #fff;
        }

        .ticket-item-details {
            flex: 1;
            margin-right: 20px;
        }

        .ticket-item h4 {
            margin: 0 0 10px 0;
            color: #f39c12;
            font-size: 1.2em;
        }

        .ticket-item p {
            margin: 5px 0;
            font-size: 0.9em;
            color: #ccc;
        }

        .ticket-item span.badge {
            background: #27ae60;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.8em;
            color: white;
            font-weight: bold;
        }

        .ticket-action {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 150px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-info {
            background: #3498db;
            color: #fff;
        }

        .btn-info:hover {
            background: #2980b9;
        }

        .dashboard-intro-text h1 {
            color: #fff;
            text-align: center;
        }
    </style>
</head>

<body>
    <header class="dashboard-header">
        <div class="header-left" style="display: flex; align-items: center; gap: 20px;">
            <a href="dashboard_cliente.html"
                style="color: #f39c12; text-decoration: none; font-size: 20px; display: flex; align-items: center;">
                <i class="fas fa-arrow-left"></i>
            </a>
            <a href="dashboard_cliente.html"><img src="../../imagenes/Logo_Autoguest.png" alt="Logo de AutoGuest"
                    width="110" class="logo"></a>
        </div>
        <div class="header-right">
        </div>
    </header>

    <main>
        <section class="dashboard-container">
            <div class="dashboard-header">
                <div class="dashboard-intro-text">
                    <h1>Historial de Tickets y Soporte</h1>
                </div>
            </div>

            <div class="tickets-list" id="tickets-list">
                <!-- Tickets will be loaded here by JavaScript -->
                <p style="text-align:center; color:white;">Cargando historial...</p>
            </div>
        </section>
    </main>



    <script>
        const API_URL = 'http://localhost:3000';

        document.addEventListener('DOMContentLoaded', async () => {
            const userId = sessionStorage.getItem('userId');
            const userName = sessionStorage.getItem('userName');

            if (!userId) {
                alert("Debes iniciar sesión");
                window.location.href = '../../login_cliente.html';
                return;
            }



            try {
                const res = await fetch(`${API_URL}/api/tickets/cliente/${userId}`, {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                });

                if (res.ok) {
                    const tickets = await res.json();
                    const listContainer = document.getElementById('tickets-list');
                    listContainer.innerHTML = '';

                    if (tickets.length === 0) {
                        listContainer.innerHTML = '<p style="text-align:center; color:white;">No tienes tickets aún.</p>';
                        return;
                    }

                    tickets.forEach(ticket => {
                        let isPayment = ticket.asunto.includes('Comprobante de Pago');
                        let isCatalog = !!ticket.idPedido; // Si tiene idPedido es del catálogo, sino es de cita.

                        let tipoText = isCatalog ? "Pedido de Catálogo" : "Cita Taller / Servicio";
                        if (!isPayment) tipoText = "Soporte General"; // Por si usan el ticket para otra cosa

                        listContainer.innerHTML += `
                            <div class="ticket-item">
                                <div class="ticket-item-details">
                                    <h4>${ticket.idTicket} <span class="badge">${ticket.estado}</span></h4>
                                    <p><strong>Asunto:</strong> ${ticket.asunto}</p>
                                    <p><strong>Tipo:</strong> ${tipoText}</p>
                                </div>
                                <div class="ticket-action">
                                    <a href="ticket_confirmacion.html?ticket=${ticket.idTicket}" class="btn btn-info">
                                        <i class="fas fa-eye"></i> Ver Detalle PDF
                                    </a>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    document.getElementById('tickets-list').innerHTML = '<p style="text-align:center; color:red;">No se pudo cargar el historial.</p>';
                }
            } catch (err) {
                console.error("Error al cargar historial:", err);
            }
        });
    </script>
</body>

</html>
